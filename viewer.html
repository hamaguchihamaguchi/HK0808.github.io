<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室在室状況</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .summary-box {
      background: #eff6ff;
      border-radius: 14px;
      padding: 14px;
    }
    .summary-title {
      font-size: 0.85rem;
      color: #4b5563;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .summary-value {
      font-size: 1.35rem;
      font-weight: 800;
      color: #111827;
    }
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .member-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      border-left: 8px solid #16a34a;
    }
    .member-card.out {
      border-left-color: #9ca3af;
    }
    .member-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .member-name {
      font-size: 1.1rem;
      font-weight: 800;
    }
    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.in {
      background: #dcfce7;
      color: #166534;
    }
    .badge.out {
      background: #f3f4f6;
      color: #4b5563;
    }
    .member-meta {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .empty {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      color: #6b7280;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }
    .sub {
      color: #6b7280;
      margin-top: 8px;
      line-height: 1.7;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
    @media (max-width: 560px) {
      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>研究室在室状況</h1>

    <div class="card">
      <div class="summary">
        <div class="summary-box">
          <div class="summary-title">現在の人数</div>
          <div class="summary-value" id="currentCount">0人</div>
        </div>
        <div class="summary-box">
          <div class="summary-title">最終更新</div>
          <div class="summary-value" id="lastUpdated">-</div>
        </div>
      </div>
      <div class="sub">このページは閲覧専用です。開いても入退室は発生しません。</div>
      <div class="sub"><a href="./index.html">名前設定ページへ</a></div>
    </div>

    <div id="memberList" class="member-list"></div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyDykqZFJcIurcovYkQvbWqr5vchYGOHgsU",
      authDomain: "system-2e861.firebaseapp.com",
      databaseURL: "https://system-2e861-default-rtdb.firebaseio.com",
      projectId: "system-2e861"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    var currentUsersCache = {};
    var historyTodayCache = {};

    function todayKey() {
      const now = new Date();
      return now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, "0") + "-" +
        String(now.getDate()).padStart(2, "0");
    }

    function formatDateTime(ms) {
      const date = new Date(ms);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      return y + "/" + m + "/" + d + " " + hh + ":" + mm;
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(totalSec / 3600);
      const minutes = Math.floor((totalSec % 3600) / 60);
      if (hours > 0) return hours + "時間" + minutes + "分";
      return minutes + "分";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderUsers() {
      const memberList = document.getElementById("memberList");
      const countEl = document.getElementById("currentCount");
      memberList.innerHTML = "";

      const inUsers = Object.values(currentUsersCache).map(u => ({...u, isIn:true}));

      const outUsers = [];
      Object.keys(historyTodayCache).forEach(function(name) {
        const encoded = encodeURIComponent(name);
        if (!currentUsersCache[encoded]) {
          const sessions = Object.values(historyTodayCache[name] || {});
          if (sessions.length > 0) {
            sessions.sort((a,b) => (b.checkOutTime||0) - (a.checkOutTime||0));
            const last = sessions[0];
            outUsers.push({
              name: name,
              checkOutTime: last.checkOutTime,
              durationMs: last.durationMs,
              isIn: false
            });
          }
        }
      });

      const users = inUsers.concat(outUsers);
      countEl.textContent = inUsers.length + "人";
      document.getElementById("lastUpdated").textContent = formatDateTime(Date.now());

      if (users.length === 0) {
        memberList.innerHTML = '<div class="empty">本日の表示対象がありません。</div>';
        return;
      }

      users.sort(function(a, b) {
        const ta = a.isIn ? (a.checkInTime || 0) : (a.checkOutTime || 0);
        const tb = b.isIn ? (b.checkInTime || 0) : (b.checkOutTime || 0);
        return tb - ta;
      });

      users.forEach(function(user) {
        const card = document.createElement("div");
        card.className = "member-card" + (user.isIn ? "" : " out");

        const badgeClass = user.isIn ? "in" : "out";
        const badgeText = user.isIn ? "在室中" : "本日退出済み";

        let meta = "";
        if (user.isIn) {
          const elapsedMs = Date.now() - (user.checkInTime || Date.now());
          meta = `
            入室時刻: ${formatDateTime(user.checkInTime || Date.now())}<br>
            滞在時間: ${formatDuration(elapsedMs)}
          `;
        } else {
          meta = `
            最終退出時刻: ${formatDateTime(user.checkOutTime || Date.now())}<br>
            最終滞在時間: ${formatDuration(user.durationMs || 0)}
          `;
        }

        card.innerHTML = `
          <div class="member-top">
            <div class="member-name">${escapeHtml(user.name || "名前なし")}</div>
            <div class="badge ${badgeClass}">${badgeText}</div>
          </div>
          <div class="member-meta">${meta}</div>
        `;
        memberList.appendChild(card);
      });
    }

    function loadTodayHistory() {
      db.ref("history").once("value", function(snapshot) {
        historyTodayCache = {};
        const today = todayKey();
        snapshot.forEach(function(userNode) {
          const encodedName = userNode.key;
          const sessionsObj = userNode.val() || {};
          Object.keys(sessionsObj).forEach(function(ts) {
            const session = sessionsObj[ts];
            if (session.dayKey === today) {
              const decodedName = decodeURIComponent(encodedName);
              if (!historyTodayCache[decodedName]) historyTodayCache[decodedName] = {};
              historyTodayCache[decodedName][ts] = session;
            }
          });
        });
        renderUsers();
      });
    }

    window.onload = function() {
      db.ref("users").on("value", function(snapshot) {
        currentUsersCache = {};
        snapshot.forEach(function(child) {
          currentUsersCache[child.key] = child.val();
        });
        renderUsers();
      });

      loadTodayHistory();
      setInterval(renderUsers, 1000);
      setInterval(loadTodayHistory, 30000);
    };
  </script>
</body>
</html>
