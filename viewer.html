<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室在室状況</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .summary-box {
      background: #eff6ff;
      border-radius: 14px;
      padding: 14px;
    }
    .summary-title {
      font-size: 0.85rem;
      color: #4b5563;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .summary-value {
      font-size: 1.35rem;
      font-weight: 800;
      color: #111827;
    }
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .member-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      border-left: 6px solid #16a34a;
    }
    .member-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .member-name {
      font-size: 1.1rem;
      font-weight: 800;
    }
    .badge {
      background: #dcfce7;
      color: #166534;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .member-meta {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .empty {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      color: #6b7280;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }
    .sub {
      color: #6b7280;
      margin-top: 8px;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
    @media (max-width: 560px) {
      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>研究室在室状況</h1>

    <div class="card">
      <div class="summary">
        <div class="summary-box">
          <div class="summary-title">現在の人数</div>
          <div class="summary-value" id="currentCount">0人</div>
        </div>
        <div class="summary-box">
          <div class="summary-title">最終更新</div>
          <div class="summary-value" id="lastUpdated">-</div>
        </div>
      </div>
      <div class="sub">このページは閲覧専用です。開いても入退室は発生しません。</div>
      <div class="sub"><a href="./touch.html">打刻ページへ</a></div>
    </div>

    <div id="memberList" class="member-list"></div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyDykqZFJcIurcovYkQvbWqr5vchYGOHgsU",
      authDomain: "system-2e861.firebaseapp.com",
      databaseURL: "https://system-2e861-default-rtdb.firebaseio.com",
      projectId: "system-2e861"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    var currentUsersCache = {};

    function formatDateTime(ms) {
      const date = new Date(ms);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      return y + "/" + m + "/" + d + " " + hh + ":" + mm;
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(totalSec / 3600);
      const minutes = Math.floor((totalSec % 3600) / 60);
      if (hours > 0) return hours + "時間" + minutes + "分";
      return minutes + "分";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderUsers() {
      const memberList = document.getElementById("memberList");
      const countEl = document.getElementById("currentCount");
      memberList.innerHTML = "";

      const users = Object.values(currentUsersCache).sort(function(a, b) {
        return (a.checkInTime || 0) - (b.checkInTime || 0);
      });

      countEl.textContent = users.length + "人";
      document.getElementById("lastUpdated").textContent = formatDateTime(Date.now());

      if (users.length === 0) {
        memberList.innerHTML = '<div class="empty">現在、研究室にいる人はいません。</div>';
        return;
      }

      users.forEach(function(user) {
        const elapsedMs = Date.now() - (user.checkInTime || Date.now());
        const card = document.createElement("div");
        card.className = "member-card";
        card.innerHTML = `
          <div class="member-top">
            <div class="member-name">${escapeHtml(user.name || "名前なし")}</div>
            <div class="badge">在室中</div>
          </div>
          <div class="member-meta">
            入室時刻: ${formatDateTime(user.checkInTime || Date.now())}<br>
            滞在時間: ${formatDuration(elapsedMs)}
          </div>
        `;
        memberList.appendChild(card);
      });
    }

    window.onload = function() {
      db.ref("users").on("value", function(snapshot) {
        currentUsersCache = {};
        snapshot.forEach(function(child) {
          currentUsersCache[child.key] = child.val();
        });
        renderUsers();
      });

      setInterval(renderUsers, 1000);
    };
  </script>
</body>
</html>
