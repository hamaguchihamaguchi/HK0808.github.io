<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室勤怠システム - 打刻</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    .big {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .success { color: #166534; }
    .danger { color: #b91c1c; }
    .neutral { color: #1d4ed8; }
    .warn { color: #92400e; }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>打刻</h1>

  <div class="card">
    <div id="message" class="big">処理中...</div>
    <div id="detail"></div>
  </div>

  <div class="card">
    <p><a href="./viewer.html">閲覧ページへ</a></p>
    <p><a href="./admin.html">記録ページへ</a></p>
  </div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDykqZFJcIurcovYkQvbWqr5vchYGOHgsU",
  authDomain: "system-2e861.firebaseapp.com",
  databaseURL: "https://system-2e861-default-rtdb.firebaseio.com",
  projectId: "system-2e861"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

const STORAGE_KEY = "lab_selected_user";
const LOCK_SECONDS = 10;
const SECRET_KEY = "lab2026_attendance_x9k3";

// =========================
// 日付処理
// =========================
function getDayKey(ms) {
  const d = new Date(ms);
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0") + "-" +
    String(d.getDate()).padStart(2, "0");
}

function getMonthKey(ms) {
  const d = new Date(ms);
  return d.getFullYear() + "-" +
    String(d.getMonth() + 1).padStart(2, "0");
}

function getWeekKey(ms) {
  const d = new Date(ms);
  const day = d.getDay();
  const diffToMonday = (day === 0 ? 6 : day - 1);
  d.setDate(d.getDate() - diffToMonday);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return y + "-W-" + m + "-" + dd;
}

function nextDayStart(ms) {
  const d = new Date(ms);
  d.setHours(24, 0, 0, 0);
  return d.getTime();
}

function getQueryParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

// =========================
// UI
// =========================
function setMessage(msg, detail, cls) {
  const m = document.getElementById("message");
  const d = document.getElementById("detail");
  m.textContent = msg;
  d.textContent = detail;
  m.className = "big " + cls;
}

// =========================
// 日跨ぎ・月跨ぎ・週集計
// =========================
async function addDurationSplit(encodedName, decodedName, start, end) {
  let cur = start;

  while (cur < end) {
    const next = nextDayStart(cur);
    const segmentEnd = Math.min(end, next);
    const duration = segmentEnd - cur;

    const dayKey = getDayKey(cur);
    const monthKey = getMonthKey(cur);
    const weekKey = getWeekKey(cur);

    const dailyRef = db.ref("dailyTotals/" + encodedName + "/" + dayKey);
    const monthlyRef = db.ref("monthlyTotals/" + encodedName + "/" + monthKey);
    const weeklyRef = db.ref("weeklyTotals/" + weekKey + "/" + encodedName);

    await dailyRef.transaction(v => (v || 0) + duration);
    await monthlyRef.transaction(v => (v || 0) + duration);
    await weeklyRef.transaction(v => (v || 0) + duration);

    cur = segmentEnd;
  }
}

// =========================
// 打刻
// =========================
async function run() {
  const key = getQueryParam("key");
  if (key !== SECRET_KEY) {
    setMessage("このページからは打刻できません", "正しいキー付きURLで開いてください。", "danger");
    return;
  }

  const name = localStorage.getItem(STORAGE_KEY);
  if (!name) {
    setMessage("名前未設定", "先に名前設定をしてください", "danger");
    return;
  }

  const encoded = encodeURIComponent(name);
  const now = Date.now();

  // 連打防止
  const metaRef = db.ref("meta/" + encoded);
  const metaSnap = await metaRef.once("value");
  const meta = metaSnap.val() || {};

  if (meta.lastActionTime && now - meta.lastActionTime < LOCK_SECONDS * 1000) {
    const remain = Math.ceil((LOCK_SECONDS * 1000 - (now - meta.lastActionTime)) / 1000);
    setMessage("連続打刻不可", "あと " + remain + " 秒待ってください", "warn");
    return;
  }

  const userRef = db.ref("users/" + encoded);
  const snap = await userRef.once("value");

  // =========================
  // 入室
  // =========================
  if (!snap.exists()) {
    await userRef.set({
      name: name,
      checkInTime: now
    });

    await metaRef.update({
      lastActionTime: now
    });

    setMessage("入室しました", name, "success");
    return;
  }

  // =========================
  // 退出
  // =========================
  const data = snap.val();
  const checkIn = data.checkInTime;
  const duration = now - checkIn;

  const checkoutDayKey = getDayKey(now);
  const checkoutMonthKey = getMonthKey(now);

  // 元の履歴（ユーザー別）
  await db.ref("history/" + encoded + "/" + now).set({
    name: name,
    checkInTime: checkIn,
    checkOutTime: now,
    durationMs: duration,
    dayKey: checkoutDayKey,
    monthKey: checkoutMonthKey
  });

  // 日付別履歴（軽量表示用）
  await db.ref("historyByDate/" + checkoutDayKey + "/" + encoded + "/" + now).set({
    name: name,
    checkInTime: checkIn,
    checkOutTime: now,
    durationMs: duration,
    dayKey: checkoutDayKey,
    monthKey: checkoutMonthKey
  });

  // 日跨ぎ・月跨ぎ・週集計
  await addDurationSplit(encoded, name, checkIn, now);

  await userRef.remove();

  await metaRef.update({
    lastActionTime: now
  });

  setMessage("退出しました", name, "neutral");
}

window.onload = function() {
  run().catch(function(error) {
    setMessage("エラー", error.message, "danger");
  });
};
</script>
</body>
</html>
