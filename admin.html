<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室勤怠システム - 記録ページ</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 1.3rem;
      margin: 0 0 16px;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    .summary-box {
      background: #eff6ff;
      border-radius: 14px;
      padding: 14px;
    }
    .summary-title {
      font-size: 0.85rem;
      color: #4b5563;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .summary-value {
      font-size: 1.1rem;
      font-weight: 800;
      color: #111827;
      line-height: 1.4;
    }
    .rank-list, .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      background: #f9fafb;
      padding: 12px 14px;
      border-radius: 12px;
      flex-wrap: wrap;
    }
    .name {
      font-weight: 800;
    }
    .value {
      color: #1d4ed8;
      font-weight: 800;
    }
    .sub {
      color: #6b7280;
      line-height: 1.7;
    }
    .history-item {
      background: #f9fafb;
      border-radius: 12px;
      padding: 12px 14px;
      line-height: 1.7;
    }
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    input, select, button {
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .summary {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 560px) {
      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>記録ページ</h1>

    <div class="card">
      <div class="summary">
        <div class="summary-box">
          <div class="summary-title">現在在室人数</div>
          <div class="summary-value" id="currentCount">0人</div>
        </div>
        <div class="summary-box">
          <div class="summary-title">今日の打刻件数</div>
          <div class="summary-value" id="todayHistoryCount">0件</div>
        </div>
        <div class="summary-box">
          <div class="summary-title">今週集計対象人数</div>
          <div class="summary-value" id="weeklyUserCount">0人</div>
        </div>
        <div class="summary-box">
          <div class="summary-title">表示対象月</div>
          <div class="summary-value" id="currentMonthLabel">-</div>
        </div>
        <div class="summary-box">
          <div class="summary-title">先月スナップショット</div>
          <div class="summary-value" id="lastMonthLabel">-</div>
        </div>
      </div>

      <div style="margin-top:16px;">
        <a href="./viewer.html">← 閲覧ページへ戻る</a>
      </div>
    </div>

    <div class="card">
      <h2>今日の滞在時間ランキング</h2>
      <div id="todayRanking" class="rank-list"></div>
    </div>

    <div class="card">
      <h2>今週の滞在時間ランキング</h2>
      <div id="weeklyRanking" class="rank-list"></div>
    </div>

    <div class="card">
      <h2>今月の個人合計時間</h2>
      <div class="filter-row">
        <select id="monthSelect"></select>
      </div>
      <div id="monthlyTotals" class="rank-list"></div>
    </div>

    <div class="card">
      <h2>先月の個人合計時間（確定値）</h2>
      <div id="lastMonthTotals" class="rank-list"></div>
    </div>

    <div class="card">
      <h2>打刻履歴の確認</h2>
      <div class="filter-row">
        <input type="text" id="historyNameFilter" placeholder="名前で絞り込み">
        <button id="cleanupBtn">35日より古い履歴を整理</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyDykqZFJcIurcovYkQvbWqr5vchYGOHgsU",
      authDomain: "system-2e861.firebaseapp.com",
      databaseURL: "https://system-2e861-default-rtdb.firebaseio.com",
      projectId: "system-2e861"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    let usersCache = {};
    let sessionsCache = [];
    let monthlySnapshotsCache = {};

    function todayKey() {
      const now = new Date();
      return now.getFullYear() + "-" +
        String(now.getMonth() + 1).padStart(2, "0") + "-" +
        String(now.getDate()).padStart(2, "0");
    }

    function currentMonthKey() {
      const now = new Date();
      return now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    }

    function previousMonthKey() {
      const now = new Date();
      now.setMonth(now.getMonth() - 1);
      return now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
    }

    function startOfToday() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d.getTime();
    }

    function startOfTomorrow() {
      const d = new Date();
      d.setHours(24, 0, 0, 0);
      return d.getTime();
    }

    function startOfCurrentWeek() {
      const d = new Date();
      const day = d.getDay();
      const diffToMonday = (day === 0 ? 6 : day - 1);
      d.setDate(d.getDate() - diffToMonday);
      d.setHours(0, 0, 0, 0);
      return d.getTime();
    }

    function startOfNextWeek() {
      const d = new Date(startOfCurrentWeek());
      d.setDate(d.getDate() + 7);
      return d.getTime();
    }

    function startOfMonthByKey(monthKey) {
      const parts = monthKey.split("-");
      const y = Number(parts[0]);
      const m = Number(parts[1]) - 1;
      return new Date(y, m, 1, 0, 0, 0, 0).getTime();
    }

    function startOfNextMonthByKey(monthKey) {
      const parts = monthKey.split("-");
      const y = Number(parts[0]);
      const m = Number(parts[1]) - 1;
      return new Date(y, m + 1, 1, 0, 0, 0, 0).getTime();
    }

    function formatDateTime(ms) {
      const date = new Date(ms);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mm = String(date.getMinutes()).padStart(2, "0");
      const ss = String(date.getSeconds()).padStart(2, "0");
      return y + "/" + m + "/" + d + " " + hh + ":" + mm + ":" + ss;
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const hours = Math.floor(totalSec / 3600);
      const minutes = Math.floor((totalSec % 3600) / 60);
      if (hours > 0) return hours + "時間" + minutes + "分";
      return minutes + "分";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function overlapDuration(startA, endA, startB, endB) {
      const start = Math.max(startA, startB);
      const end = Math.min(endA, endB);
      return Math.max(0, end - start);
    }

    function buildMonthOptions() {
      const select = document.getElementById("monthSelect");
      const prevValue = select.value;

      const monthSet = new Set();
      monthSet.add(currentMonthKey());

      sessionsCache.forEach(function(s) {
        const start = new Date(s.checkInTime);
        const end = new Date(s.checkOutTime);
        const cursor = new Date(start.getFullYear(), start.getMonth(), 1);
        const limit = new Date(end.getFullYear(), end.getMonth(), 1);

        while (cursor <= limit) {
          const key = cursor.getFullYear() + "-" + String(cursor.getMonth() + 1).padStart(2, "0");
          monthSet.add(key);
          cursor.setMonth(cursor.getMonth() + 1);
        }
      });

      const arr = Array.from(monthSet).sort().reverse();
      select.innerHTML = "";

      arr.forEach(function(m) {
        const op = document.createElement("option");
        op.value = m;
        op.textContent = m;
        select.appendChild(op);
      });

      if (arr.includes(prevValue)) {
        select.value = prevValue;
      } else {
        select.value = currentMonthKey();
      }

      document.getElementById("currentMonthLabel").textContent = select.value;
      document.getElementById("lastMonthLabel").textContent = previousMonthKey();
    }

    function renderRankList(containerId, arr) {
      const el = document.getElementById(containerId);
      el.innerHTML = "";

      if (arr.length === 0) {
        el.innerHTML = '<div class="row"><div class="sub">データがありません。</div></div>';
        return;
      }

      arr.forEach(function(item, idx) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="name">${idx + 1}位 ${escapeHtml(item.name)}</div>
          <div class="value">${formatDuration(item.totalMs)}</div>
        `;
        el.appendChild(row);
      });
    }

    function buildRanking(rangeStart, rangeEnd) {
      const map = {};
      const now = Date.now();

      sessionsCache.forEach(function(s) {
        const name = s.name || "名前なし";
        if (!map[name]) map[name] = 0;
        map[name] += overlapDuration(
          s.checkInTime || 0,
          s.checkOutTime || 0,
          rangeStart,
          rangeEnd
        );
      });

      Object.keys(usersCache).forEach(function(encodedName) {
        const user = usersCache[encodedName];
        const name = user.name || decodeURIComponent(encodedName);
        if (!map[name]) map[name] = 0;
        map[name] += overlapDuration(
          user.checkInTime || now,
          now,
          rangeStart,
          rangeEnd
        );
      });

      return Object.keys(map)
        .map(name => ({ name, totalMs: map[name] }))
        .filter(x => x.totalMs > 0)
        .sort((a, b) => b.totalMs - a.totalMs);
    }

    function renderTodayRanking() {
      const arr = buildRanking(startOfToday(), startOfTomorrow());
      renderRankList("todayRanking", arr);
    }

    function renderWeeklyRanking() {
      const arr = buildRanking(startOfCurrentWeek(), startOfNextWeek());
      document.getElementById("weeklyUserCount").textContent = arr.length + "人";
      renderRankList("weeklyRanking", arr);
    }

    function renderMonthlyTotals() {
      const month = document.getElementById("monthSelect").value || currentMonthKey();
      document.getElementById("currentMonthLabel").textContent = month;

      const rangeStart = startOfMonthByKey(month);
      const rangeEnd = startOfNextMonthByKey(month);
      const arr = buildRanking(rangeStart, rangeEnd);

      renderRankList("monthlyTotals", arr);
    }

    function renderLastMonthTotals() {
      const prev = previousMonthKey();
      document.getElementById("lastMonthLabel").textContent = prev;

      const node = monthlySnapshotsCache[prev] || {};
      const arr = Object.keys(node)
        .map(encodedName => ({
          name: node[encodedName].name || decodeURIComponent(encodedName),
          totalMs: node[encodedName].totalMs || 0
        }))
        .filter(x => x.totalMs > 0)
        .sort((a, b) => b.totalMs - a.totalMs);

      renderRankList("lastMonthTotals", arr);
    }

    function renderHistory() {
      const filter = (document.getElementById("historyNameFilter").value || "").trim().toLowerCase();
      const list = document.getElementById("historyList");
      list.innerHTML = "";

      const allArr = sessionsCache.slice().sort((a, b) => (b.checkOutTime || 0) - (a.checkOutTime || 0));

      document.getElementById("todayHistoryCount").textContent =
        allArr.filter(x => {
          const d = new Date(x.checkOutTime || 0);
          const key = d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, "0") + "-" +
            String(d.getDate()).padStart(2, "0");
          return key === todayKey();
        }).length + "件";

      let arr = allArr;
      if (filter) {
        arr = arr.filter(x => (x.name || "").toLowerCase().includes(filter));
      }

      if (arr.length === 0) {
        list.innerHTML = '<div class="history-item">履歴がありません。</div>';
        return;
      }

      arr.forEach(function(item) {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
          <strong>${escapeHtml(item.name || "名前なし")}</strong><br>
          入室: ${formatDateTime(item.checkInTime || 0)}<br>
          退出: ${formatDateTime(item.checkOutTime || 0)}<br>
          滞在時間: ${formatDuration((item.checkOutTime || 0) - (item.checkInTime || 0))}
        `;
        list.appendChild(div);
      });
    }

    async function createLastMonthSnapshotIfMissing() {
      const prev = previousMonthKey();
      const snapRef = db.ref("monthlySnapshots/" + prev);
      const existing = await snapRef.once("value");
      if (existing.exists()) return;

      const rangeStart = startOfMonthByKey(prev);
      const rangeEnd = startOfNextMonthByKey(prev);
      const arr = buildRanking(rangeStart, rangeEnd);

      const payload = {};
      arr.forEach(function(item) {
        const encoded = encodeURIComponent(item.name);
        payload[encoded] = {
          name: item.name,
          totalMs: item.totalMs
        };
      });

      await snapRef.set(payload);
    }

    async function cleanupOldHistory() {
      const limit = Date.now() - (35 * 24 * 60 * 60 * 1000);

      await createLastMonthSnapshotIfMissing();

      const historySnap = await db.ref("history").once("value");
      const updates = {};

      historySnap.forEach(function(userNode) {
        const userKey = userNode.key;
        userNode.forEach(function(sessionNode) {
          const data = sessionNode.val() || {};
          if ((data.checkOutTime || 0) < limit) {
            updates["history/" + userKey + "/" + sessionNode.key] = null;
          }
        });
      });

      const historyByDateSnap = await db.ref("historyByDate").once("value");
      historyByDateSnap.forEach(function(dayNode) {
        dayNode.forEach(function(userNode) {
          userNode.forEach(function(segmentNode) {
            const data = segmentNode.val() || {};
            if ((data.segmentEndTime || 0) < limit) {
              updates["historyByDate/" + dayNode.key + "/" + userNode.key + "/" + segmentNode.key] = null;
            }
          });
        });
      });

      if (Object.keys(updates).length > 0) {
        await db.ref().update(updates);
      }

      alert("35日より古い履歴を整理しました。");
    }

    function renderAll() {
      document.getElementById("currentCount").textContent = Object.keys(usersCache).length + "人";
      buildMonthOptions();
      renderTodayRanking();
      renderWeeklyRanking();
      renderMonthlyTotals();
      renderLastMonthTotals();
      renderHistory();
    }

    window.onload = function() {
      db.ref("users").on("value", function(snapshot) {
        usersCache = {};
        snapshot.forEach(function(child) {
          usersCache[child.key] = child.val();
        });
        renderAll();
      });

      db.ref("history").on("value", function(snapshot) {
        sessionsCache = [];
        snapshot.forEach(function(userNode) {
          const sessionMap = userNode.val() || {};
          Object.keys(sessionMap).forEach(function(sessionId) {
            const session = sessionMap[sessionId];
            sessionsCache.push({
              name: session.name,
              checkInTime: session.checkInTime,
              checkOutTime: session.checkOutTime
            });
          });
        });
        renderAll();
      });

      db.ref("monthlySnapshots").on("value", function(snapshot) {
        monthlySnapshotsCache = snapshot.val() || {};
        renderLastMonthTotals();
      });

      document.getElementById("monthSelect").addEventListener("change", renderMonthlyTotals);
      document.getElementById("historyNameFilter").addEventListener("input", renderHistory);
      document.getElementById("cleanupBtn").addEventListener("click", cleanupOldHistory);

      setInterval(function() {
        renderTodayRanking();
        renderWeeklyRanking();
        renderMonthlyTotals();
      }, 60000);
    };
  </script>
</body>
</html>
