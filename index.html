<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室勤怠システム - 初期設定</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: white;
      width: 100%;
    }
    .sub {
      color: #6b7280;
      line-height: 1.7;
    }
    .links a {
      display: block;
      margin-top: 10px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
    .status {
      font-weight: 700;
      color: #111827;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>研究室勤怠システム 初期設定</h1>

    <div class="card">
      <p class="sub">
        この端末で使う名前を保存します。最初に1回だけ設定してください。
      </p>
      <input id="nameInput" type="text" placeholder="名前を入力">
      <button onclick="saveName()">この端末に名前を保存</button>
      <div class="status" id="currentStatus">現在の保存名: 未設定</div>
    </div>

    <div class="card links">
      <a href="./touch.html">打刻ページを開く</a>
      <a href="./viewer.html">閲覧ページを開く</a>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "lab_selected_user";

    function updateStatus() {
      const saved = localStorage.getItem(STORAGE_KEY) || "";
      document.getElementById("currentStatus").textContent =
        "現在の保存名: " + (saved || "未設定");
      if (saved) {
        document.getElementById("nameInput").value = saved;
      }
    }

    function saveName() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) {
        alert("名前を入力してください");
        return;
      }
      localStorage.setItem(STORAGE_KEY, name);
      updateStatus();
      alert("この端末に「" + name + "」を保存しました");
    }

    window.onload = updateStatus;
  </script>
</body>
</html>
