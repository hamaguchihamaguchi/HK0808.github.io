<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>研究室在室システム</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      margin: 16px 0 24px;
      line-height: 1.2;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
      margin-bottom: 12px;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-add {
      background: #2563eb;
      color: #fff;
    }

    .btn-checkin {
      background: #16a34a;
      color: #fff;
    }

    .btn-checkout {
      background: #dc2626;
      color: #fff;
    }

    .btn-delete {
      background: #6b7280;
      color: #fff;
    }

    .selected-box {
      margin-top: 12px;
      padding: 14px;
      border-radius: 12px;
      background: #eff6ff;
      font-weight: 700;
    }

    .member-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .member-chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #111827;
      font-weight: 700;
      border: 2px solid transparent;
    }

    .member-chip.selected {
      background: #dbeafe;
      border-color: #2563eb;
      color: #1d4ed8;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .summary-box {
      background: #eff6ff;
      border-radius: 14px;
      padding: 14px;
    }

    .summary-title {
      font-size: 0.85rem;
      color: #4b5563;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .summary-value {
      font-size: 1.4rem;
      font-weight: 800;
      color: #111827;
    }

    .sub-text {
      color: #6b7280;
      font-size: 0.95rem;
      margin-top: 8px;
    }

    .member-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .member-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      border-left: 6px solid #16a34a;
    }

    .member-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .member-name {
      font-size: 1.15rem;
      font-weight: 800;
    }

    .badge {
      background: #dcfce7;
      color: #166534;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .member-meta {
      color: #4b5563;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .empty {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      color: #6b7280;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .notice {
      margin-top: 10px;
      font-size: 0.92rem;
      color: #6b7280;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .title {
        font-size: 1.8rem;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .button-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">研究室在室システム</h1>

    <div class="card">
      <h2 class="section-title">登録済みメンバー</h2>
      <div id="savedMembers" class="member-picker"></div>

      <div class="selected-box" id="selectedUserBox">
        選択中: なし
      </div>

      <div class="notice">
        一度追加した名前はこの端末に保存されます。次回からは名前をタップするだけで使えます。
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">新しい名前を追加</h2>
      <label class="label" for="newName">名前</label>
      <input id="newName" type="text" placeholder="新しい名前を入力">

      <div class="button-row">
        <button class="btn-add" onclick="addMember()">名前を追加</button>
        <button class="btn-delete" onclick="deleteSelectedMember()">選択中の名前を削除</button>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">操作</h2>
      <div class="button-row">
        <button class="btn-checkin" onclick="checkIn()">入室</button>
        <button class="btn-checkout" onclick="checkOut()">退出</button>
      </div>
    </div>

    <div class="card">
      <div class="summary">
        <div class="summary-box">
          <div class="summary-title">現在の人数</div>
          <div class="summary-value" id="currentCount">0人</div>
        </div>
        <div class="summary-box">
          <div class="summary-title">今日の自分の累計滞在時間</div>
          <div class="summary-value" id="myTodayTotal">0分</div>
        </div>
      </div>
      <div class="sub-text" id="lastUpdated">最終更新: -</div>
    </div>

    <h2 class="section-title">現在いる人</h2>
    <div id="memberList" class="member-list"></div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyDykqZFJcIurcovYkQvbWqr5vchYGOHgsU",
      authDomain: "system-2e861.firebaseapp.com",
      databaseURL: "https://system-2e861-default-rtdb.firebaseio.com",
      projectId: "system-2e861"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    var currentUsersCache = {};
    var selectedUser = localStorage.getItem("lab_selected_user") || "";

    function getSavedMembers() {
      try {
        return JSON.parse(localStorage.getItem("lab_saved_members") || "[]");
      } catch (e) {
        return [];
      }
    }

    function setSavedMembers(list) {
      localStorage.setItem("lab_saved_members", JSON.stringify(list));
    }

    function saveSelectedUser(name) {
      selectedUser = name;
      localStorage.setItem("lab_selected_user", name);
      renderSelectedUser();
      loadTodayMyTotal();
    }

    function renderSelectedUser() {
      document.getElementById("selectedUserBox").textContent =
        "選択中: " + (selectedUser || "なし");
    }

    function renderSavedMembers() {
      var box = document.getElementById("savedMembers");
      box.innerHTML = "";

      var members = getSavedMembers();

      if (members.length === 0) {
        box.innerHTML = '<div class="empty">まだ名前が登録されていません。</div>';
        renderSelectedUser();
        return;
      }

      members.forEach(function(name) {
        var btn = document.createElement("button");
        btn.className = "member-chip" + (name === selectedUser ? " selected" : "");
        btn.textContent = name;
        btn.onclick = function() {
          saveSelectedUser(name);
          renderSavedMembers();
        };
        box.appendChild(btn);
      });

      renderSelectedUser();
    }

    function addMember() {
      var input = document.getElementById("newName");
      var name = input.value.trim();

      if (!name) {
        alert("名前を入力してください");
        return;
      }

      var members = getSavedMembers();

      if (members.includes(name)) {
        alert("その名前はすでに登録されています");
        saveSelectedUser(name);
        renderSavedMembers();
        input.value = "";
        return;
      }

      members.push(name);
      members.sort(function(a, b) {
        return a.localeCompare(b, "ja");
      });

      setSavedMembers(members);
      saveSelectedUser(name);
      renderSavedMembers();
      input.value = "";
    }

    function deleteSelectedMember() {
      if (!selectedUser) {
        alert("削除する名前を選択してください");
        return;
      }

      var ok = confirm(selectedUser + " を端末の登録一覧から削除しますか？");
      if (!ok) return;

      var members = getSavedMembers().filter(function(name) {
        return name !== selectedUser;
      });

      setSavedMembers(members);
      selectedUser = "";
      localStorage.removeItem("lab_selected_user");
      renderSavedMembers();
      loadTodayMyTotal();
    }

    function todayKey() {
      var now = new Date();
      var y = now.getFullYear();
      var m = String(now.getMonth() + 1).padStart(2, "0");
      var d = String(now.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + d;
    }

    function formatDateTime(ms) {
      var date = new Date(ms);
      var y = date.getFullYear();
      var m = String(date.getMonth() + 1).padStart(2, "0");
      var d = String(date.getDate()).padStart(2, "0");
      var hh = String(date.getHours()).padStart(2, "0");
      var mm = String(date.getMinutes()).padStart(2, "0");
      return y + "/" + m + "/" + d + " " + hh + ":" + mm;
    }

    function formatDuration(ms) {
      var totalSec = Math.max(0, Math.floor(ms / 1000));
      var hours = Math.floor(totalSec / 3600);
      var minutes = Math.floor((totalSec % 3600) / 60);

      if (hours > 0) {
        return hours + "時間" + minutes + "分";
      }
      return minutes + "分";
    }

    function setLastUpdated() {
      document.getElementById("lastUpdated").textContent =
        "最終更新: " + formatDateTime(Date.now());
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function checkIn() {
      if (!selectedUser) {
        alert("先に名前を選択してください");
        return;
      }

      var encodedName = encodeURIComponent(selectedUser);
      var userRef = db.ref("users/" + encodedName);

      userRef.once("value").then(function(snapshot) {
        if (snapshot.exists()) {
          alert("この名前はすでに入室中です");
          return;
        }

        var now = Date.now();
        return userRef.set({
          name: selectedUser,
          checkInTime: now,
          status: "in"
        });
      }).then(function() {
        loadTodayMyTotal();
      }).catch(function(error) {
        if (error) {
          alert("入室に失敗しました: " + error.message);
        }
      });
    }

    function checkOut() {
      if (!selectedUser) {
        alert("先に名前を選択してください");
        return;
      }

      var encodedName = encodeURIComponent(selectedUser);
      var userRef = db.ref("users/" + encodedName);

      userRef.once("value").then(function(snapshot) {
        if (!snapshot.exists()) {
          alert("この名前は現在入室していません");
          return;
        }

        var data = snapshot.val();
        var now = Date.now();
        var checkInTime = data.checkInTime || now;
        var durationMs = now - checkInTime;
        var day = todayKey();

        var historyRef = db.ref("history/" + encodedName + "/" + now);
        var totalRef = db.ref("dailyTotals/" + encodedName + "/" + day);

        return historyRef.set({
          name: selectedUser,
          checkInTime: checkInTime,
          checkOutTime: now,
          durationMs: durationMs
        }).then(function() {
          return totalRef.transaction(function(current) {
            return (current || 0) + durationMs;
          });
        }).then(function() {
          return userRef.remove();
        }).then(function() {
          loadTodayMyTotal();
          alert(selectedUser + " さんを退出処理しました");
        });
      }).catch(function(error) {
        if (error) {
          alert("退出に失敗しました: " + error.message);
        }
      });
    }

    function loadTodayMyTotal() {
      if (!selectedUser) {
        document.getElementById("myTodayTotal").textContent = "0分";
        return;
      }

      var encodedName = encodeURIComponent(selectedUser);
      var day = todayKey();
      var totalRef = db.ref("dailyTotals/" + encodedName + "/" + day);

      totalRef.once("value").then(function(snapshot) {
        var totalMs = snapshot.val() || 0;

        return db.ref("users/" + encodedName).once("value").then(function(userSnap) {
          if (userSnap.exists()) {
            var user = userSnap.val();
            if (user.checkInTime) {
              totalMs += (Date.now() - user.checkInTime);
            }
          }
          document.getElementById("myTodayTotal").textContent = formatDuration(totalMs);
        });
      }).catch(function() {
        document.getElementById("myTodayTotal").textContent = "取得失敗";
      });
    }

    function subscribeUsers() {
      db.ref("users").on("value", function(snapshot) {
        currentUsersCache = {};
        snapshot.forEach(function(child) {
          currentUsersCache[child.key] = child.val();
        });
        renderUsersFromCache();
        setLastUpdated();
        loadTodayMyTotal();
      });
    }

    function renderUsersFromCache() {
      var memberList = document.getElementById("memberList");
      var countEl = document.getElementById("currentCount");

      memberList.innerHTML = "";

      var users = Object.values(currentUsersCache);

      users.sort(function(a, b) {
        return (a.checkInTime || 0) - (b.checkInTime || 0);
      });

      countEl.textContent = users.length + "人";

      if (users.length === 0) {
        memberList.innerHTML = '<div class="empty">現在、研究室にいる人はいません。</div>';
        return;
      }

      users.forEach(function(user) {
        var card = document.createElement("div");
        card.className = "member-card";

        var elapsedMs = Date.now() - (user.checkInTime || Date.now());

        card.innerHTML = `
          <div class="member-top">
            <div class="member-name">${escapeHtml(user.name || "名前なし")}</div>
            <div class="badge">在室中</div>
          </div>
          <div class="member-meta">
            入室時刻: ${formatDateTime(user.checkInTime || Date.now())}<br>
            滞在時間: ${formatDuration(elapsedMs)}
          </div>
        `;

        memberList.appendChild(card);
      });
    }

    window.onload = function() {
      renderSavedMembers();
      subscribeUsers();
      loadTodayMyTotal();
      setInterval(renderUsersFromCache, 1000);
    };
  </script>
</body>
</html>
