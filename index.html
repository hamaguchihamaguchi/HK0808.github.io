<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究室在室システム</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
}
button {
  padding: 10px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>研究室在室システム</h2>

<input id="name" placeholder="名前を入力">
<br><br>

<button onclick="checkIn()">入室</button>
<button onclick="checkOut()">退出</button>

<h3>現在いる人</h3>
<ul id="list"></ul>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDykqZFJcIurcovYkQvbWqr5vchYGOHgsU",
  authDomain: "system-2e861.firebaseapp.com",
  databaseURL: "https://system-2e861-default-rtdb.firebaseio.com",
  projectId: "system-2e861",
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

function checkIn() {
  var name = document.getElementById("name").value;
  if (!name) return alert("名前を入力してください");

  db.ref("users/" + name).set({
    name: name,
    time: Date.now(),
    status: "in"
  });
}

function checkOut() {
  var name = document.getElementById("name").value;
  if (!name) return alert("名前を入力してください");

  db.ref("users/" + name).remove();
}

db.ref("users").on("value", function(snapshot) {
  var list = document.getElementById("list");
  list.innerHTML = "";

  snapshot.forEach(function(child) {
    var data = child.val();
    var li = document.createElement("li");
    var minutes = Math.floor((Date.now() - data.time) / 60000);
    li.textContent = data.name + "（" + minutes + "分）";
    list.appendChild(li);
  });
});
</script>

</body>
</html>
